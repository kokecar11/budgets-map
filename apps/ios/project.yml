name: BudgetsMap
options:
  bundleIdPrefix: com.budgetsmap
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"
  createIntermediateGroups: true
  indentWidth: 4
  tabWidth: 4

configs:
  Debug: debug
  Release: release

configFiles:
  Debug: Config/Debug.xcconfig
  Release: Config/Release.xcconfig

targets:
  BudgetsMap:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: BudgetsMap
        excludes:
          - "Resources/Info.plist"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.budgetsmap.ios
        INFOPLIST_FILE: BudgetsMap/Resources/Info.plist
        SWIFT_VERSION: "6.0"
        ENABLE_HARDENED_RUNTIME: YES
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
      configs:
        Debug:
          OTHER_SWIFT_FLAGS: "-DDEBUG"
        Release:
          OTHER_SWIFT_FLAGS: ""
    configFiles:
      Debug: Config/Debug.xcconfig
      Release: Config/Release.xcconfig

  BudgetsMapTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: BudgetsMapTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.budgetsmap.ios.tests
        SWIFT_VERSION: "6.0"
    dependencies:
      - target: BudgetsMap
    configFiles:
      Debug: Config/Debug.xcconfig
      Release: Config/Release.xcconfig

schemes:
  BudgetsMap:
    build:
      targets:
        BudgetsMap: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - BudgetsMapTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
