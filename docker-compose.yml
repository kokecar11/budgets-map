  #     timeout: 5s
  #     retries: 5
  #   restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: budgetsmap_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: budgetsmap_api
    env_file:
      - ./apps/api/.env
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api/src:/app/src
    depends_on:
      - redis
    restart: unless-stopped

  celery_worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: budgetsmap_celery_worker
    command: celery -A src.celery_app worker --loglevel=info
    env_file:
      - ./apps/api/.env
    volumes:
      - ./apps/api/src:/app/src
    depends_on:
      - api
      - redis
    restart: unless-stopped

  celery_beat:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: budgetsmap_celery_beat
    command: celery -A src.celery_app beat --loglevel=info
    env_file:
      - ./apps/api/.env
    volumes:
      - ./apps/api/src:/app/src
    depends_on:
      - api
      - redis
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: budgetsmap_web
    env_file:
      - ./apps/web/.env.local
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      API_URL: http://api:8000
      AUTH_TRUST_HOST: "true"
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
